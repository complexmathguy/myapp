template: true   # required for local templates
valuesFilePath: values.yml

resources:
  - name: demoRepo
    type: GitRepo
    configuration:
      # SCM integration where the repository is located 
      gitProvider: {{ .Values.demoRepo.gitProvider }} # this will be replaced from values.yml
      # Repository path, including org name/repo name
      path: {{ .Values.demoRepo.path }} # this will be replaced from values.yml
      branches:
        # Specifies which branches will trigger dependent steps  
        include: master
  - name: demoBuildInfo
    type: BuildInfo
    configuration:
      sourceArtifactory:    MyMavenIntegration
      buildName:            demoBuild
      buildNumber:          1
  - name: demoDockerBuildInfo2
    type: BuildInfo
    configuration:
      sourceArtifactory:    MyDockerIntegration
      buildName:            demoDockerBuild
      buildNumber:          1
  - name: buildArchiveFile
    type: FileSpec
    configuration:
      sourceArtifactory: MyMavenIntegration
      pattern: local-maven-repo/**/**/demo*.jar
      target: target/
  - name: dbp_image10
    type: Image
    configuration:
      registry: DockerRegistry               # <-- replace with your artifactory integration
      sourceRepository: local-docker-repo           # <-- required if registry is Artifactory
      imageName: knowops.jfrog.io/local-docker-repo/myapp  # < -- replace with your image path and name
      imageTag: latest
      autoPull: false
      
pipelines:
  - name: demoPipeline4
    steps:
      - name: build_step100
        type: MvnBuild
        configuration:        
          affinityGroup:       demo_affinity_group
          autoPublishBuildInfo: true
          outputResources:
            - name: demoBuildInfo          
          inputResources:
            - name: demoRepo             # Use the demoRepo resource   
 #           - name: demoBuildInfo
         
          environmentVariables:
              repo_username: "steven.randolph@realmethods.com"
              repo_passsword: "6969Cutlass!!"              
              repo_url: "https://jcenter.bintray.com"
              skipTests: "false"
#              DATABASE_URL: jdbc:mysql://34.227.151.24:3306/cloudMigrate?createDatabaseIfNotExist=true
          sourceLocation: .
          mvnCommand: clean package
          integrations:
            - name: MyMavenIntegration    
          forceXrayScan: true
          failOnScan: true   
          deployerReleaseRepo: local-maven-repo
          deployerSnapshotRepo: local-maven-repo
        execution:
          onStart:
            - echo "Preparing for build using Maven..."
            - echo "MySQL install is required in order to test core app functionality..."
            - echo "First, pull the latest MySQL Docker image..."
            - docker pull mysql:8	            
            - echo "Next, run the MySQL image in it's own container exposing port 3306..."
            - docker run --name myAppMySQLContainer -e MYSQL_ROOT_PASSWORD=letmein2 -d mysql:8
            - echo "Export the server IP address into a env var so MySQL can be accessed outside the container..."
            - export SERVER_IP="$(hostname -I | cut -f1 -d' ')"
            - printenv SERVER_IP
            - echo "Export the server IP address into a url  so MySQL can be accessed outside the container..."            
            - export DATABASE_URL="jdbc:mysql://localhost:3306/myApp?createDatabaseIfNotExist=true"
            - printenv DATABASE_URL
          onSuccess:
            - echo "Maven build was successful"
          onFailure:
            - docker ps
            - echo "uh oh, something went wrong with the Maven build" 
          onComplete:
            - docker stop myAppMySQLContainer
            - docker rm myAppMySQLContainer          

      - name: docker_build_step2
        type: DockerBuild
        configuration:
          #inherits from bash
          affinityGroup:       demo_affinity_group
          dockerFileLocation:  .
          dockerFileName:      Dockerfile
          dockerImageName:     knowops.jfrog.io/local-docker-repo/myapp
          dockerImageTag:      latest
 
          integrations:
            - name:            MyDockerHubIntegration  # required
 
          inputResources:
            - name:             demoRepo         # required, git repository containing your Dockerfile
            - name:             buildArchiveFile # what was constructed during the build step

          inputSteps:
            - name:             build_step100
            
        execution:
          onStart:
            - echo "Preparing for Docker image build..."
          onSuccess:
            - echo "Docker image build was successful"
          onFailure:
            - echo "uh oh, something went wrong with the Docker image build"
            
      - name: docker_push_step
        type: DockerPush
        configuration:
          #inherits from bash
          affinityGroup:        demo_affinity_group
          targetRepository:     local-docker-repo   # required
          forceXrayScan:        true                # default false
          failOnScan:           false               # default true
          autoPublishBuildInfo: true                # default false
 
          integrations:
            - name:             MyDockerIntegration  # required
            
          inputSteps:
            - name:             docker_build_step2   # required
          outputResources:
            - name:             demoDockerBuildInfo2 # required if autoPublishBuildInfo is true
            - name:             dbp_image10
        execution:
          onStart:
            - echo "Preparing for Docker image push..."
          onSuccess:
            - echo "Docker image push was successful"
          onFailure:
            - echo "uh oh, something went wrong with the Docker image push"

